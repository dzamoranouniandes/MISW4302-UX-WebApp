<!-- componente de lista de alarma -->
<div class="topbar">
  <span class="topbar-title">Alarmas</span>
</div>

<div class="content">
  <div class="alarms-header">
    <h2>Alarmas Configuradas</h2>
    <button class="btn btn-primary" (click)="createAlarm.emit()">Crear Nueva Alarma</button>
  </div>

  <div class="alarms-grid">
    @for (alarm of alarms(); track alarm.id) {
      <div class="alarm-card">
        <div class="alarm-top">
          <div class="alarm-time">{{ alarm.time }}</div>
          <label class="toggle">
            <input type="checkbox" [checked]="alarm.enabled" (change)="toggleAlarm(alarm.id)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="alarm-label">{{ alarm.label }}</div>

        @if (alarm.type === 'weekly') {
          <div class="day-chips">
            @for (day of alarm.days!; track $index) {
              <div class="day-chip">{{ day }}</div>
            }
          </div>
        } @else {
          <div class="alarm-date">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            {{ alarm.date }}
          </div>
        }
      </div>
    }
  </div>
</div>
